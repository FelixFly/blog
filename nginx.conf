server {
    listen 80;
    server_name www.felixfly.top;  # 替换为你的域名

    root /home/github/blog/www/current;  # 指向符号链接，deploy.sh 原子切换
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # 静态资源长期缓存（Docusaurus 带 hash 的资源文件）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
